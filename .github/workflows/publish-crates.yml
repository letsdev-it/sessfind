# On push to main: compare Cargo.toml with crates.io, bump patch if needed (2a),
# publish, then commit the version bump with [skip ci] so the workflow does not re-run in a loop.
name: Publish to crates.io

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: publish-crates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Avoid failing forks; require registry token from repo secrets.
    if: ${{ !github.event.repository.fork && secrets.CARGO_REGISTRY_TOKEN != '' }}

    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish (version logic + cargo publish)
        run: bash .github/scripts/publish-crates.sh
