# On push to main: compare Cargo.toml with crates.io, bump patch if needed (2a),
# publish, then commit the version bump with [skip ci] so the workflow does not re-run in a loop.
name: Publish to crates.io

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: publish-crates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # `secrets` is not allowed in job-level `if` (schema / evaluation rules).
    if: ${{ !github.event.repository.fork }}

    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Require CARGO_REGISTRY_TOKEN
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "::error::Set the CARGO_REGISTRY_TOKEN repository secret to publish to crates.io."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish (version logic + cargo publish)
        run: bash .github/scripts/publish-crates.sh
